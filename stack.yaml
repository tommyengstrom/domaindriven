resolver: nightly-2025-06-18
packages:
- domaindriven-core
- domaindriven-effectful
- domaindriven-effectful-examples
- domaindriven
- domaindriven-examples

extra-deps:
  - openapi3-3.2.4
  - servant-auth-server-0.4.9.0
  - insert-ordered-containers-0.2.6
  - servant-openapi3-2.0.1.6
  
ghc-options:
  "$locals": -fwrite-ide-info
  '$everything': -haddock
    -hiedir=.hie

allow-newer: true
allow-newer-deps:
  - openapi3
  - servant-auth-server
  - servant-openapi3
  - insert-ordered-containers

system-ghc: true
