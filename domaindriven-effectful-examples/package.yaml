name:                domaindriven-effectful-examples
version:             0.5.0
github:              "tommyengstrom/domaindriven"
license:             BSD3
author:              "Tommy Engström"
maintainer:          "tommy@tommyengstrom.com"
copyright:           "2023 Tommy Engström"

extra-source-files:
- README.md

# Metadata used when publishing your package
synopsis: Examples for domaindriven-effectful
category: Web

description:         Examples demonstrating the Effectful-based domaindriven library

dependencies:
- base
- effectful-core
- effectful-plugin

default-extensions:
- BlockArguments
- ConstraintKinds
- DataKinds
- DeriveAnyClass
- DeriveFunctor
- DeriveGeneric
- DeriveTraversable
- DerivingStrategies
- DuplicateRecordFields
- FlexibleContexts
- FlexibleInstances
- FunctionalDependencies
- GADTs
- GeneralizedNewtypeDeriving
- ImportQualifiedPost
- LambdaCase
- MultiParamTypeClasses
- MultiWayIf
- NamedFieldPuns
- NoImplicitPrelude
- OverloadedLabels
- OverloadedStrings
- PolyKinds
- RankNTypes
- ScopedTypeVariables
- StandaloneDeriving
- StrictData
- TupleSections
- TypeApplications
- TypeFamilyDependencies
- TypeOperators
- TypeSynonymInstances
- ViewPatterns

ghc-options:
- -Wall
- -Werror
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wpartial-fields
- -Wredundant-constraints
- -Wincomplete-patterns
- -Wno-unused-packages
- -fplugin=Effectful.Plugin

executables:
  simple-example:
    main: Main.hs
    source-dirs: simple
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - aeson
      - domaindriven-core
      - domaindriven-effectful
      - effectful
      - servant
      - servant-server
      - warp
    
  postgres-example:
    main: Main.hs
    source-dirs: postgres
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - aeson
      - domaindriven-core
      - domaindriven-effectful
      - effectful
      - servant
      - servant-server
      - warp
    
